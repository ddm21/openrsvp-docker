version: '3.8'

services:
  rsvp-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rsvp-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    networks:
      - rsvp_network

  caddy:
    image: caddy:2-alpine
    container_name: rsvp-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - rsvp_network
    depends_on:
      - rsvp-web

networks:
  rsvp_network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
