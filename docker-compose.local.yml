version: '3.8'

services:
  rsvp-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rsvp-web-local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - rsvp_local_network

networks:
  rsvp_local_network:
    driver: bridge
